<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>geometric.games</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script>
  (function () {
    var segmentsToKeep = 0;
    var l = window.location;
    var pathParts = l.pathname.split('/');
    var base = pathParts.slice(0, 1 + segmentsToKeep).join('/');
    var rest = pathParts.slice(1 + segmentsToKeep).join('/').replace(/&/g, '~and~');
    var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
    l.replace(
      l.protocol + '//' + l.host + base + '/?/' + rest + query + l.hash
    );
  })();
</script>
</head>
<body></body>
</html>
