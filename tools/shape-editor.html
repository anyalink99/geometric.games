<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shape Editor — geometric.games</title>
<style>
  :root {
    --bg: #0e0c10;
    --bg-panel: rgba(26, 22, 29, 0.92);
    --border: #3a3340;
    --text: #e8e8ea;
    --text-dim: #a8a2ad;
    --accent: #c084fc;
    --accent-soft: #a855f7;
    --accent-deep: #6b2ea0;
    --danger: #ff7a7a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  /* Full-bleed canvas, square, centred. */
  #board {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    background: var(--bg);
    touch-action: none; user-select: none;
    display: block;
  }

  /* ─── Floating panels ─────────────────────────────────────── */
  .panel {
    position: fixed;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 10;
  }

  .toolbar {
    top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    max-width: calc(100vw - 32px);
    flex-wrap: wrap; justify-content: center;
  }
  .tb-group { display: flex; gap: 4px; align-items: center; }
  .tb-divider {
    width: 1px; align-self: stretch; background: var(--border);
    margin: 2px 4px;
  }
  .tb-label {
    color: var(--text-dim); font-size: 12px; letter-spacing: 0.4px;
    text-transform: uppercase; margin-right: 6px;
  }

  .inspector {
    top: 16px; right: 16px; width: 260px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    padding: 14px;
  }
  .inspector h3 {
    margin: 0 0 10px; color: var(--accent); font-size: 12px;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .inspector .row + .row { margin-top: 10px; }

  .bottom-bar {
    bottom: 16px; left: 50%; transform: translateX(-50%);
    width: min(720px, calc(100vw - 32px));
    padding: 10px 12px;
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap;
  }
  .bottom-bar input {
    flex: 1; min-width: 0;
    font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
    background: rgba(14,12,16,0.8);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 8px;
  }
  .bottom-bar select {
    font: inherit;
    background: rgba(14,12,16,0.8);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
  }

  .stats-badge {
    position: fixed; bottom: 16px; left: 16px;
    padding: 6px 10px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    font: 11px/1.2 ui-monospace, monospace;
    color: var(--text-dim);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
    pointer-events: none;
  }
  .stats-badge b { color: var(--text); font-weight: 600; }

  /* Hint + error float above bottom-bar, don't shift layout. */
  .hint-area {
    position: fixed;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    width: min(620px, calc(100vw - 32px));
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    z-index: 10;
    pointer-events: none;
  }
  .hint {
    padding: 6px 12px;
    background: rgba(26, 22, 29, 0.75);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .error {
    padding: 6px 12px;
    background: rgba(80, 20, 20, 0.9);
    border: 1px solid #6b2a2a;
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
  }
  .error[hidden] { display: none; }

  /* ─── Buttons / inputs ────────────────────────────────────── */
  button {
    font: inherit; font-weight: 600;
    background: rgba(42, 35, 48, 0.95);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 100ms, border-color 100ms;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.active {
    background: var(--accent-soft);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 2px 0 var(--accent-deep);
  }
  button.danger {
    background: rgba(120, 30, 30, 0.8);
    border-color: #8b3a3a;
    color: white;
  }
  button.danger:hover { border-color: var(--danger); }
  button.small { padding: 5px 10px; font-size: 12px; }

  select {
    font: inherit;
    background: rgba(42, 35, 48, 0.95);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    cursor: pointer;
    width: 100%;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    min-width: 0;
  }
  /* Vertical layout so the slider always gets full inspector width — label
     + value float on top, bar below. Makes fine adjustments actually
     clickable. */
  .range-row {
    display: flex; flex-direction: column; gap: 4px;
  }
  .range-header {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px;
  }
  .range-label { color: var(--text-dim); }
  .range-value {
    font: 12px/1.2 ui-monospace, monospace; color: var(--text);
  }

  .radio-row {
    display: flex; gap: 4px;
  }
  .radio-row button {
    flex: 1; padding: 6px 4px; font-size: 12px;
  }

  /* ─── Canvas elements ─────────────────────────────────────── */
  .grid-line { stroke: #1c1820; stroke-width: 0.5; }
  .grid-cross { stroke: #3a3340; stroke-width: 1; }
  .kfold-axis { stroke: #6b2ea0; stroke-width: 1; stroke-dasharray: 3 6; opacity: 0.5; }

  .shape-fill {
    fill: var(--accent-soft); fill-opacity: 0.78;
    fill-rule: evenodd;
    pointer-events: none;
  }
  .shape-outline {
    fill: none;
    stroke: var(--accent); stroke-width: 2.5; stroke-linejoin: round;
    filter: drop-shadow(0 0 12px rgba(192,132,252,0.28));
    pointer-events: none;
  }
  .draft-outline {
    fill: none; stroke: var(--accent); stroke-width: 2;
    pointer-events: none;
  }
  /* Centroid doubles as a transform handle for the whole shape:
     drag it → translate, click it → show rotate + scale gizmos. */
  .centroid-handle {
    fill: #ffd166; stroke: #111; stroke-width: 1.5;
    cursor: grab;
    pointer-events: auto;
  }
  .centroid-handle.selected {
    stroke: #fff; stroke-width: 2;
    filter: drop-shadow(0 0 4px rgba(255, 209, 102, 0.85));
  }
  .transform-handle {
    stroke: #1a161d; stroke-width: 1.5;
    cursor: grab;
    pointer-events: auto;
  }
  .transform-handle.rotate { fill: #5ec9ff; }
  .transform-handle.scale  { fill: #ff9f6e; }
  .transform-line {
    stroke: #ffd166; stroke-width: 1; stroke-dasharray: 3 3;
    opacity: 0.55; pointer-events: none;
  }

  .anchor-handle {
    fill: var(--accent); stroke: #fff; stroke-width: 1.5;
    cursor: grab;
  }
  .anchor-handle.first { fill: #fff; stroke: var(--accent); stroke-width: 2; }
  .anchor-handle.selected { fill: #ffd166; stroke: #fff; stroke-width: 2; }

  /* Tangent lines + handles are rendered for every anchor with non-zero
     tangents but hidden by default. Selection flips the `visible` class so
     only the active anchor shows its handles, with zero DOM churn — keeping
     handle identities stable for dblclick. */
  .tangent-line {
    stroke: #ffd166; stroke-width: 1; stroke-dasharray: 3 3;
    opacity: 0.7; pointer-events: none;
    visibility: hidden;
  }
  .tangent-line.visible { visibility: visible; }
  .tangent-handle {
    fill: #ffd166; stroke: #111; stroke-width: 1;
    cursor: grab;
    visibility: hidden; pointer-events: none;
  }
  .tangent-handle.visible { visibility: visible; pointer-events: auto; }

  .edge-mid {
    fill: #dcd4e6; stroke: #1a161d; stroke-width: 1;
    cursor: grab;
  }
  .edge-mid.selected { fill: #ffd166; stroke: #111; stroke-width: 1.5; }

  .hole-handle {
    fill: var(--accent-deep); stroke: #fff; stroke-width: 1.5;
    cursor: grab;
  }
  .hole-handle.rim { fill: var(--accent-deep); }
  .hole-handle.selected { fill: #ffd166; stroke: #fff; stroke-width: 2; }
  .hole-handle.vertex { fill: var(--accent-deep); }

  .hole-edge-mid {
    fill: #b8a8c8; stroke: #1a161d; stroke-width: 1;
    cursor: grab;
  }

  .ghost-line { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 4 4; opacity: 0.65; pointer-events: none; }
</style>
</head>
<body>

<svg id="board" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
  <g id="grid-layer"></g>
  <g id="kfold-layer"></g>
  <g id="shape-layer"></g>
  <g id="draft-layer"></g>
  <g id="ghost-layer"></g>
  <g id="handle-layer"></g>
  <g id="centroid-layer"></g>
</svg>

<div class="panel toolbar">
  <div class="tb-group">
    <button id="mode-outer" class="active" title="Click to add outer anchors (1)">Outer</button>
    <button id="mode-hole" title="Click to add a circle hole (2)">Hole</button>
  </div>
  <div class="tb-divider"></div>
  <div class="tb-group">
    <button id="btn-close" class="small" title="Close the outer ring (Enter)">Close</button>
    <button id="btn-undo" class="small" title="Undo last step (Ctrl+Z / U)">Undo</button>
    <button id="btn-clear" class="small" title="Delete everything">Clear</button>
    <button id="btn-normalize" class="small" title="Scale to match generator output">Normalize</button>
  </div>
  <div class="tb-divider"></div>
  <div class="tb-group">
    <span class="tb-label">k-fold</span>
    <input type="range" id="kfold" min="1" max="8" step="1" value="1" style="width: 90px;">
    <span id="kfold-val" style="min-width: 12px; font-variant-numeric: tabular-nums;">1</span>
  </div>
</div>

<div class="panel inspector" id="inspector" hidden>
  <h3 id="inspector-title">Nothing selected</h3>
  <div id="inspector-body"></div>
</div>

<div class="hint-area">
  <div class="hint" id="hint">Click to drop the first outer anchor.</div>
  <div class="error" id="error" hidden></div>
</div>

<div class="panel bottom-bar">
  <input id="url-out" readonly placeholder="Share URL appears once the shape is valid.">
  <button id="btn-copy" class="small">Copy</button>
  <select id="target-variation" title="Which puzzle to play with this shape">
    <option value="cut/half">Cut · Half</option>
    <option value="cut/ratio">Cut · Target Ratio</option>
    <option value="cut/quad">Cut · Quad</option>
    <option value="cut/tri">Cut · Tri</option>
    <option value="cut/angle">Cut · Angle</option>
    <option value="inscribe/square">Inscribe · Square</option>
    <option value="inscribe/triangle">Inscribe · Triangle</option>
    <option value="balance/pole">Balance · Pole</option>
    <option value="balance/centroid">Balance · Centroid</option>
    <option value="balance/perch">Balance · Perch</option>
  </select>
  <button id="btn-open" class="small active">Open</button>
  <button id="btn-import" class="small" title="Load a c-… URL">Import…</button>
</div>

<div class="stats-badge" id="stats-badge"><b>0</b> anchors · <b>0</b> holes · k=<b>1</b> · area <b>—</b></div>

<script src="../js/core/constants.js"></script>
<script src="../js/geometry/geometry.js"></script>
<script src="../js/geometry/shape-utils.js"></script>
<script src="../js/geometry/edge-samplers.js"></script>
<script src="../js/core/custom-shape.js"></script>
<script>
(function () {
  'use strict';

  const SVGN = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('board');
  const gridLayer = document.getElementById('grid-layer');
  const kfoldLayer = document.getElementById('kfold-layer');
  const shapeLayer = document.getElementById('shape-layer');
  const draftLayer = document.getElementById('draft-layer');
  const ghostLayer = document.getElementById('ghost-layer');
  const handleLayer = document.getElementById('handle-layer');
  const centroidLayer = document.getElementById('centroid-layer');
  const hintEl = document.getElementById('hint');
  const errorEl = document.getElementById('error');
  const inspectorEl = document.getElementById('inspector');
  const inspectorTitle = document.getElementById('inspector-title');
  const inspectorBody = document.getElementById('inspector-body');
  const statsBadge = document.getElementById('stats-badge');
  const urlOut = document.getElementById('url-out');

  const MIN_SEG_PX = 6;
  const DEFAULT_CIRCLE_R = 25;

  // ─── State ──────────────────────────────────────────────────────
  const state = {
    mode: 'outer',              // 'outer' | 'hole' | null
    kFold: 1,
    anchors: [],                // {x, y, h1x, h1y, h2x, h2y}
    edges: [],                  // {kind, param}
    holes: [],                  // {type, ...}
    outerClosed: false,
    selected: null,             // {kind: 'anchor'|'edge'|'hole', ...}
    drag: null,                 // {kind, ..., pointerId}
    hoverPoint: null,
  };

  // ─── Grid (one-time) ────────────────────────────────────────────
  (function drawGrid() {
    for (let i = 40; i < 400; i += 40) {
      for (const axis of ['h', 'v']) {
        const line = document.createElementNS(SVGN, 'line');
        if (axis === 'h') { line.setAttribute('x1', 0); line.setAttribute('y1', i); line.setAttribute('x2', 400); line.setAttribute('y2', i); }
        else              { line.setAttribute('x1', i); line.setAttribute('y1', 0); line.setAttribute('x2', i); line.setAttribute('y2', 400); }
        line.setAttribute('class', 'grid-line');
        gridLayer.appendChild(line);
      }
    }
    const c1 = document.createElementNS(SVGN, 'line');
    c1.setAttribute('x1', 194); c1.setAttribute('y1', 200);
    c1.setAttribute('x2', 206); c1.setAttribute('y2', 200);
    c1.setAttribute('class', 'grid-cross'); gridLayer.appendChild(c1);
    const c2 = document.createElementNS(SVGN, 'line');
    c2.setAttribute('x1', 200); c2.setAttribute('y1', 194);
    c2.setAttribute('x2', 200); c2.setAttribute('y2', 206);
    c2.setAttribute('class', 'grid-cross'); gridLayer.appendChild(c2);
  })();

  // ─── Coord helpers ──────────────────────────────────────────────
  function svgPoint(evt) {
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    const ctm = svg.getScreenCTM();
    if (!ctm) return { x: 0, y: 0 };
    const r = pt.matrixTransform(ctm.inverse());
    return { x: r.x, y: r.y };
  }
  function clampBoard(p) {
    return { x: Math.max(0, Math.min(400, p.x)), y: Math.max(0, Math.min(400, p.y)) };
  }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  // ─── Quantization snap ──────────────────────────────────────────
  // Snap drag-updated values to the exact grid the URL codec quantizes to.
  // Otherwise a one-pixel drag on screen may map to the same byte value as
  // before, and the share URL won't change — which confuses anyone trying to
  // sculpt precisely. Positions use the 400/255 step, tangent offsets use
  // 320/255 (= ±160 px range / 255 levels).
  const SNAP_POS = 400 / 255;
  const SNAP_TAN = 320 / 255;
  function snapPos(v) { return Math.round(v / SNAP_POS) * SNAP_POS; }
  function snapTan(v) { return Math.round(v / SNAP_TAN) * SNAP_TAN; }
  function snapPt(p)  { return { x: snapPos(p.x), y: snapPos(p.y) }; }

  // ─── History (undo stack) ──────────────────────────────────────
  // Each mutating action captures a snapshot of the whole design before
  // running, so Ctrl+Z / Undo restores the pre-action state wholesale.
  // Drags push on the first pointermove (see below), sliders push on
  // pointerdown (handled inside _physSlider), one-shot actions push at the
  // top of their handler — one logical edit = one undo entry throughout.
  const MAX_HISTORY = 80;
  const history = [];
  function snapshotState() {
    return {
      mode: state.mode,
      kFold: state.kFold,
      outerClosed: state.outerClosed,
      anchors: state.anchors.map(a => ({ x: a.x, y: a.y, h1x: a.h1x||0, h1y: a.h1y||0, h2x: a.h2x||0, h2y: a.h2y||0 })),
      edges:   state.edges.map(e => ({ kind: e.kind|0, param: +e.param||0 })),
      holes:   state.holes.map(h => {
        if (h.type === 'polygon') return { type: 'polygon', pts: h.pts.map(p => ({ x: p.x, y: p.y })) };
        return Object.assign({}, h);
      }),
    };
  }
  function pushHistory() {
    history.push(snapshotState());
    if (history.length > MAX_HISTORY) history.shift();
  }
  function undo() {
    if (!history.length) return;
    const prev = history.pop();
    state.mode = prev.mode;
    state.kFold = prev.kFold;
    state.outerClosed = prev.outerClosed;
    state.anchors = prev.anchors;
    state.edges = prev.edges;
    state.holes = prev.holes;
    state.selected = null;
    state.drag = null;
    // Mirror persisted UI widgets.
    const kf = document.getElementById('kfold');
    const kfv = document.getElementById('kfold-val');
    if (kf) kf.value = String(state.kFold);
    if (kfv) kfv.textContent = String(state.kFold);
    document.getElementById('mode-outer').classList.toggle('active', state.mode === 'outer');
    document.getElementById('mode-hole').classList.toggle('active', state.mode === 'hole');
    setError('');
    render();
  }

  function hasH1(a) { return (a.h1x || 0) !== 0 || (a.h1y || 0) !== 0; }
  function hasH2(a) { return (a.h2x || 0) !== 0 || (a.h2y || 0) !== 0; }

  // Compute default tangent offsets for an anchor, aligned along the mean
  // direction of its neighbours (standard smooth-curve default).
  function defaultTangents(anchorIdx) {
    const n = state.anchors.length;
    const a = state.anchors[anchorIdx];
    const prev = state.anchors[(anchorIdx - 1 + n) % n] || a;
    const next = state.anchors[(anchorIdx + 1) % n] || a;
    let dx = next.x - prev.x, dy = next.y - prev.y;
    const len = Math.hypot(dx, dy);
    if (len < 1) { dx = 40; dy = 0; }
    const scale = 0.25;
    return {
      h1x: snapTan(-dx * scale), h1y: snapTan(-dy * scale),
      h2x: snapTan(+dx * scale), h2y: snapTan(+dy * scale),
    };
  }

  // Double-click / "Add tangent(s)" handler. Only fills missing tangents —
  // never overwrites an existing one. So a half-deleted anchor (one tangent
  // live, one zero) gets the missing half back in a sensible default.
  function addMissingTangents(anchorIdx) {
    const a = state.anchors[anchorIdx];
    if (!a) return;
    const h1Missing = !hasH1(a), h2Missing = !hasH2(a);
    if (!h1Missing && !h2Missing) return;
    pushHistory();
    const d = defaultTangents(anchorIdx);
    if (h1Missing) { a.h1x = d.h1x; a.h1y = d.h1y; }
    if (h2Missing) { a.h2x = d.h2x; a.h2y = d.h2y; }
    render();
  }

  function deleteTangent(anchorIdx, which) {
    const a = state.anchors[anchorIdx];
    if (!a) return;
    pushHistory();
    a[which + 'x'] = 0;
    a[which + 'y'] = 0;
    render();
  }

  // ─── Shape derivation ───────────────────────────────────────────
  function currentDesign() {
    return { kFold: state.kFold, anchors: state.anchors, edges: state.edges, holes: state.holes };
  }
  function currentShape() {
    if (!state.outerClosed) return null;
    return designToShape(currentDesign());
  }

  function shapeIsValid(s) {
    if (!s || s.outer.length < 3) return { ok: false, reason: 'outer needs 3+ anchors' };
    if (!isSimplePolygon(s.outer)) return { ok: false, reason: 'outer outline self-intersects' };
    for (const h of (s.holes || [])) {
      if (h.length < 3 || !isSimplePolygon(h)) return { ok: false, reason: 'a hole is self-intersecting' };
      for (const pt of h) if (!pointInPolygon(pt, s.outer)) return { ok: false, reason: 'a hole sticks out of the shape' };
    }
    for (let i = 0; i < (s.holes || []).length; i++) {
      for (let j = i + 1; j < s.holes.length; j++) {
        if (polygonsOverlap(s.holes[i], s.holes[j])) return { ok: false, reason: 'two holes overlap' };
      }
    }
    return { ok: true };
  }

  // ─── Rendering ──────────────────────────────────────────────────
  function pathRing(pts, close) {
    if (!pts.length) return '';
    let d = 'M ' + pts[0].x.toFixed(2) + ' ' + pts[0].y.toFixed(2);
    for (let i = 1; i < pts.length; i++) d += ' L ' + pts[i].x.toFixed(2) + ' ' + pts[i].y.toFixed(2);
    return d + (close ? ' Z' : '');
  }

  function renderKFoldAxes() {
    kfoldLayer.innerHTML = '';
    if (state.kFold <= 1) return;
    for (let j = 0; j < state.kFold; j++) {
      const ang = j * (Math.PI * 2) / state.kFold;
      const x2 = 200 + Math.cos(ang) * 280;
      const y2 = 200 + Math.sin(ang) * 280;
      const l = document.createElementNS(SVGN, 'line');
      l.setAttribute('x1', 200); l.setAttribute('y1', 200);
      l.setAttribute('x2', x2); l.setAttribute('y2', y2);
      l.setAttribute('class', 'kfold-axis');
      kfoldLayer.appendChild(l);
    }
  }

  function renderShape() {
    shapeLayer.innerHTML = '';
    if (!state.outerClosed) { centroidLayer.innerHTML = ''; return; }
    const s = currentShape();
    if (!s) { centroidLayer.innerHTML = ''; return; }

    let d = pathRing(s.outer, true);
    for (const h of s.holes) d += ' ' + pathRing(h, true);

    const fill = document.createElementNS(SVGN, 'path');
    fill.setAttribute('class', 'shape-fill');
    fill.setAttribute('d', d);
    shapeLayer.appendChild(fill);

    const outline = document.createElementNS(SVGN, 'path');
    outline.setAttribute('class', 'shape-outline');
    outline.setAttribute('d', d);
    shapeLayer.appendChild(outline);

    renderCentroidAndTransform(s);
  }

  // Centroid handle + (when selected) rotate/scale gizmos. All live in
  // centroidLayer so they float above shape/handle layers and can be clicked
  // without getting blocked by other handles. Callable standalone from the
  // select path so the gizmos appear/disappear on click-to-select without a
  // full re-render of handleLayer.
  function renderCentroidAndTransform(shapeArg) {
    centroidLayer.innerHTML = '';
    if (!state.outerClosed) return;
    const s = shapeArg || currentShape();
    if (!s) return;
    const c = shapeCentroid(s);
    const selected = state.selected && state.selected.kind === 'centroid';

    const mark = document.createElementNS(SVGN, 'circle');
    mark.setAttribute('cx', c.x); mark.setAttribute('cy', c.y);
    mark.setAttribute('r', selected ? 6 : 5);
    mark.setAttribute('class', 'centroid-handle' + (selected ? ' selected' : ''));
    mark.dataset.role = 'centroid';
    centroidLayer.appendChild(mark);

    if (!selected) return;

    // Default handle positions: just above and to the right of the shape's
    // bounding sphere around the centroid. During an active rotate/scale
    // drag, the active handle follows the cursor so it stays under the
    // user's finger instead of snapping back to its resting axis.
    let maxR = 0;
    for (const p of s.outer) {
      const dd = Math.hypot(p.x - c.x, p.y - c.y);
      if (dd > maxR) maxR = dd;
    }
    const offset = Math.max(50, maxR + 28);
    let rot = { x: c.x, y: Math.max(14, c.y - offset) };
    let scl = { x: Math.min(386, c.x + offset), y: c.y };
    const drag = state.drag;
    if (drag && state.hoverPoint) {
      if (drag.kind === 'centroid-rotate') rot = state.hoverPoint;
      else if (drag.kind === 'centroid-scale') scl = state.hoverPoint;
    }

    const line1 = document.createElementNS(SVGN, 'line');
    line1.setAttribute('x1', c.x); line1.setAttribute('y1', c.y);
    line1.setAttribute('x2', rot.x); line1.setAttribute('y2', rot.y);
    line1.setAttribute('class', 'transform-line');
    centroidLayer.appendChild(line1);

    const line2 = document.createElementNS(SVGN, 'line');
    line2.setAttribute('x1', c.x); line2.setAttribute('y1', c.y);
    line2.setAttribute('x2', scl.x); line2.setAttribute('y2', scl.y);
    line2.setAttribute('class', 'transform-line');
    centroidLayer.appendChild(line2);

    const rotH = document.createElementNS(SVGN, 'circle');
    rotH.setAttribute('cx', rot.x); rotH.setAttribute('cy', rot.y);
    rotH.setAttribute('r', 6);
    rotH.setAttribute('class', 'transform-handle rotate');
    rotH.dataset.role = 'centroid-rotate';
    centroidLayer.appendChild(rotH);

    const sclH = document.createElementNS(SVGN, 'rect');
    const sz = 11;
    sclH.setAttribute('x', scl.x - sz / 2); sclH.setAttribute('y', scl.y - sz / 2);
    sclH.setAttribute('width', sz); sclH.setAttribute('height', sz);
    sclH.setAttribute('class', 'transform-handle scale');
    sclH.dataset.role = 'centroid-scale';
    centroidLayer.appendChild(sclH);
  }

  function renderDraft() {
    draftLayer.innerHTML = '';
    if (!state.outerClosed && state.anchors.length) {
      // Straight polyline through the anchors while drawing (no bezier preview
      // yet — you see the real curve on close).
      const p = document.createElementNS(SVGN, 'path');
      p.setAttribute('class', 'draft-outline');
      p.setAttribute('d', pathRing(state.anchors, false));
      draftLayer.appendChild(p);
    }
  }

  function renderGhost() {
    ghostLayer.innerHTML = '';
    if (!state.hoverPoint) return;
    if (!state.outerClosed && state.anchors.length && state.mode === 'outer' && !state.drag) {
      const last = state.anchors[state.anchors.length - 1];
      const line = document.createElementNS(SVGN, 'line');
      line.setAttribute('x1', last.x); line.setAttribute('y1', last.y);
      line.setAttribute('x2', state.hoverPoint.x); line.setAttribute('y2', state.hoverPoint.y);
      line.setAttribute('class', 'ghost-line');
      ghostLayer.appendChild(line);
    }
  }

  function addHandle(x, y, cls, attrs) {
    const c = document.createElementNS(SVGN, 'circle');
    c.setAttribute('cx', x); c.setAttribute('cy', y);
    c.setAttribute('r', 6);
    c.setAttribute('class', cls);
    for (const k in attrs) c.dataset[k] = attrs[k];
    handleLayer.appendChild(c);
    return c;
  }
  function addRect(x, y, size, cls, attrs) {
    const r = document.createElementNS(SVGN, 'rect');
    r.setAttribute('x', x - size / 2); r.setAttribute('y', y - size / 2);
    r.setAttribute('width', size); r.setAttribute('height', size);
    r.setAttribute('class', cls);
    for (const k in attrs) r.dataset[k] = attrs[k];
    handleLayer.appendChild(r);
    return r;
  }

  function renderHandles() {
    handleLayer.innerHTML = '';

    // Outer anchors.
    for (let i = 0; i < state.anchors.length; i++) {
      const a = state.anchors[i];
      let cls = 'anchor-handle';
      if (!state.outerClosed && i === 0 && state.anchors.length >= 3) cls += ' first';
      if (state.selected && state.selected.kind === 'anchor' && state.selected.idx === i) cls += ' selected';
      addHandle(a.x, a.y, cls, { role: 'anchor', idx: i });
    }

    // Tangent handles are drawn for every anchor that actually has a non-zero
    // tangent — not only the selected one. Anchors with zero tangents still
    // render no handle (they'd overlap the anchor and be unclickable anyway),
    // so adding a tangent is done via double-click on the anchor or the
    // "Add tangent(s)" button. Detaching visibility from selection lets a
    // click-select-then-click-again pair preserve DOM identity, which the
    // browser needs to fire a dblclick event.
    for (let i = 0; i < state.anchors.length; i++) {
      const a = state.anchors[i];
      if (hasH1(a)) drawTangent(a, 'h1', i);
      if (hasH2(a)) drawTangent(a, 'h2', i);
    }

    // Edge midpoints (only when outer is closed — gives a click target to
    // select the edge, not a UI for param magnitude).
    if (state.outerClosed) {
      const n = state.anchors.length;
      for (let i = 0; i < n; i++) {
        const a = state.anchors[i];
        const b = state.anchors[(i + 1) % n];
        const edge = state.edges[i];
        const midOnCurve = _edgeMidpointOnCurve(a, b, edge);
        let cls = 'edge-mid';
        if (state.selected && state.selected.kind === 'edge' && state.selected.idx === i) cls += ' selected';
        addRect(midOnCurve.x, midOnCurve.y, 8, cls, { role: 'edge-mid', idx: i });
      }
    }

    // Hole handles.
    for (let h = 0; h < state.holes.length; h++) {
      const hole = state.holes[h];
      const selected = state.selected && state.selected.kind === 'hole' && state.selected.idx === h;
      if (hole.type === 'circle') {
        addHandle(hole.cx, hole.cy, 'hole-handle' + (selected ? ' selected' : ''), { role: 'hole-center', hole: h });
        addHandle(hole.cx + hole.r, hole.cy, 'hole-handle rim', { role: 'hole-rim', hole: h });
      } else if (hole.type === 'lens') {
        const dx = Math.cos(hole.angle), dy = Math.sin(hole.angle);
        const ex = hole.cx - dx * hole.len / 2, ey = hole.cy - dy * hole.len / 2;
        const ex2 = hole.cx + dx * hole.len / 2, ey2 = hole.cy + dy * hole.len / 2;
        const px = -dy, py = dx;
        addHandle(ex, ey, 'hole-handle' + (selected ? ' selected' : ''), { role: 'hole-lens-end', hole: h, idx: 0 });
        addHandle(ex2, ey2, 'hole-handle', { role: 'hole-lens-end', hole: h, idx: 1 });
        addHandle(hole.cx + px * hole.bulge, hole.cy + py * hole.bulge, 'hole-handle', { role: 'hole-lens-bulge', hole: h });
      } else if (hole.type === 'polygon') {
        const pts = hole.pts;
        for (let i = 0; i < pts.length; i++) {
          addHandle(pts[i].x, pts[i].y, 'hole-handle vertex' + (selected ? ' selected' : ''), {
            role: 'hole-vertex', hole: h, idx: i,
          });
        }
        // Polygon-hole edge midpoints (for insert-on-edge via double-click).
        for (let i = 0; i < pts.length; i++) {
          const p0 = pts[i], p1 = pts[(i + 1) % pts.length];
          const mx = (p0.x + p1.x) / 2, my = (p0.y + p1.y) / 2;
          addRect(mx, my, 6, 'hole-edge-mid', { role: 'hole-edge-mid', hole: h, idx: i });
        }
      }
    }
  }

  function drawTangent(a, which, anchorIdx) {
    const hx = a[which + 'x'] || 0;
    const hy = a[which + 'y'] || 0;
    const tx = a.x + hx, ty = a.y + hy;
    const isSelected = state.selected && state.selected.kind === 'anchor'
      && state.selected.idx === anchorIdx;
    const visClass = isSelected ? ' visible' : '';
    const line = document.createElementNS(SVGN, 'line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', tx); line.setAttribute('y2', ty);
    line.setAttribute('class', 'tangent-line' + visClass);
    line.dataset.anchor = String(anchorIdx);
    handleLayer.appendChild(line);
    addHandle(tx, ty, 'tangent-handle' + visClass, {
      role: 'tangent', which,
      idx: anchorIdx,
      anchor: anchorIdx,
    });
  }

  function _edgeMidpointOnCurve(a, b, edge) {
    // Evaluate the actual curve at t=0.5 so the marker sits on the rendered
    // outline — reads as "this is the edge" no matter the kind / curvature.
    const kind = edge ? edge.kind : EDGE_KIND.SMOOTH;
    const p1 = { x: a.x + (a.h2x || 0), y: a.y + (a.h2y || 0) };
    const p2 = { x: b.x + (b.h1x || 0), y: b.y + (b.h1y || 0) };
    const t = 0.5, u = 0.5;
    // For SMOOTH and procedural kinds, bezier midpoint is a reasonable anchor
    // even if modifier displaces it slightly.
    return {
      x: u*u*u*a.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*b.x,
      y: u*u*u*a.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*b.y,
    };
  }

  // ─── Stats / hint / URL ─────────────────────────────────────────
  function updateStats() {
    const s = currentShape();
    const area = s ? Math.round(shapeArea(s)) : null;
    statsBadge.innerHTML =
      '<b>' + state.anchors.length + '</b> anchors · ' +
      '<b>' + state.holes.length + '</b> holes · ' +
      'k=<b>' + state.kFold + '</b> · ' +
      'area <b>' + (area != null ? area : '—') + '</b>';
  }

  function setHint(msg) { hintEl.textContent = msg; }
  function setError(msg) {
    if (msg) { errorEl.textContent = msg; errorEl.hidden = false; }
    else errorEl.hidden = true;
  }

  function updateHintByContext() {
    if (!state.outerClosed) {
      if (!state.anchors.length) setHint('Click to drop the first outer anchor.');
      else if (state.anchors.length < 3) setHint('Need at least 3 anchors. Keep clicking — click the white dot (or press Enter) to close.');
      else setHint('Click the white first anchor or press Enter to close the outer ring.');
      return;
    }
    if (state.mode === 'outer') setHint('Drag handles to reshape. Drag an edge midpoint to change its strength · double-click it to split · RMB anchor/tangent/hole to delete.');
    else if (state.mode === 'hole') setHint('Click anywhere to drop a circle hole. If it crosses the outer, it becomes a bite.');
    else setHint('Select anything to inspect it. Escape to deselect. Delete to remove selected anchor/hole.');
  }

  function updateURL() {
    const s = currentShape();
    const v = s ? shapeIsValid(s) : { ok: false, reason: state.outerClosed ? '' : 'close the outer first' };
    if (!v.ok) {
      urlOut.value = '';
      if (v.reason && state.outerClosed) setError(v.reason);
      else setError('');
      return;
    }
    setError('');
    try {
      const tok = encodeCustomShape(currentDesign());
      const target = document.getElementById('target-variation').value;
      const path = target === 'cut/half' ? '' : target + '/';
      urlOut.value = 'https://geometric.games/' + path + '?s=' + tok;
    } catch (e) {
      urlOut.value = '';
      setError(e.message || String(e));
    }
  }

  // ─── Inspector ──────────────────────────────────────────────────
  function renderInspector() {
    const sel = state.selected;
    if (!sel) { inspectorEl.hidden = true; return; }
    inspectorEl.hidden = false;
    if (sel.kind === 'anchor') renderAnchorInspector(sel.idx);
    else if (sel.kind === 'edge') renderEdgeInspector(sel.idx);
    else if (sel.kind === 'hole') renderHoleInspector(sel.idx);
    else if (sel.kind === 'centroid') renderCentroidInspector();
  }

  function renderCentroidInspector() {
    inspectorTitle.textContent = 'Transform whole shape';
    inspectorBody.innerHTML = '';
    const hint = document.createElement('div');
    hint.style.cssText = 'font-size: 12px; color: var(--text-dim); line-height: 1.5;';
    hint.innerHTML =
      'Drag the yellow centroid · move the shape<br>' +
      'Drag the blue circle · rotate around centroid<br>' +
      'Drag the orange square · scale from centroid';
    inspectorBody.appendChild(hint);
  }

  function renderAnchorInspector(idx) {
    const a = state.anchors[idx];
    if (!a) { state.selected = null; inspectorEl.hidden = true; return; }
    inspectorTitle.textContent = 'Anchor ' + (idx + 1) + ' / ' + state.anchors.length;
    inspectorBody.innerHTML = '';

    const missing = (!hasH1(a) ? 1 : 0) + (!hasH2(a) ? 1 : 0);
    if (missing > 0) {
      const btnRow = _row();
      btnRow.appendChild(_btn(
        missing === 2 ? 'Add tangents' : 'Add missing tangent',
        'small', () => addMissingTangents(idx)
      ));
      inspectorBody.appendChild(btnRow);
    }

    const hint = document.createElement('div');
    hint.style.cssText = 'font-size: 12px; color: var(--text-dim); margin-top: 8px; line-height: 1.5;';
    hint.innerHTML =
      'Double-click anchor · add tangents<br>' +
      'Right-click anchor · delete it<br>' +
      'Right-click tangent · delete tangent';
    inspectorBody.appendChild(hint);
  }

  function renderEdgeInspector(idx) {
    const e = state.edges[idx];
    if (!e) { state.selected = null; inspectorEl.hidden = true; return; }
    inspectorTitle.textContent = 'Edge ' + (idx + 1) + ' / ' + state.edges.length;
    inspectorBody.innerHTML = '';

    const kindRow = _row();
    const lbl = _label('Type');
    const sel = document.createElement('select');
    for (let k = 0; k < EDGE_KIND_COUNT; k++) {
      const opt = document.createElement('option');
      opt.value = String(k); opt.textContent = EDGE_KIND_LABELS[k];
      sel.appendChild(opt);
    }
    sel.value = String(e.kind);
    sel.addEventListener('change', () => {
      pushHistory();
      e.kind = Number(sel.value) | 0;
      render();
    });
    kindRow.append(lbl, sel);
    inspectorBody.appendChild(kindRow);

    if (e.kind !== EDGE_KIND.SMOOTH) {
      inspectorBody.appendChild(_physSlider(
        'Strength', e.param, 0, 1, 1 / 255,
        (v) => v.toFixed(2),
        (v) => { e.param = v; }
      ));
    }

    const actions = _row();
    actions.append(
      _btn('Split at middle', 'small', () => splitEdge(idx)),
      _btn('Apply to all', 'small', () => {
        pushHistory();
        for (const ee of state.edges) { ee.kind = e.kind; ee.param = e.param; }
        render();
      })
    );
    inspectorBody.appendChild(actions);

    const bottom = _row();
    bottom.append(_btn('Straighten adjacent', 'small', () => {
      pushHistory(); straightenAdjacent(idx);
    }));
    inspectorBody.appendChild(bottom);
  }

  function renderHoleInspector(idx) {
    const h = state.holes[idx];
    if (!h) { state.selected = null; inspectorEl.hidden = true; return; }
    const typeLabel = h.type === 'circle' ? 'Circle' : h.type === 'lens' ? 'Lens' : 'Polygon (' + h.pts.length + ')';
    inspectorTitle.textContent = 'Hole · ' + typeLabel;
    inspectorBody.innerHTML = '';

    const typeLbl = _label('Shape');
    typeLbl.style.marginBottom = '6px';
    inspectorBody.appendChild(typeLbl);
    const radio = document.createElement('div');
    radio.className = 'radio-row';
    for (const t of ['circle', 'lens', 'polygon']) {
      const btn = document.createElement('button');
      btn.className = 'small' + (h.type === t ? ' active' : '');
      btn.textContent = t[0].toUpperCase() + t.slice(1);
      btn.addEventListener('click', () => convertHoleType(idx, t));
      radio.appendChild(btn);
    }
    inspectorBody.appendChild(radio);

    // Physical-value sliders with steps matching the URL quantization, so
    // every visible slider position actually produces a different URL. The
    // callbacks mutate state only; _physSlider triggers the non-inspector
    // render, which keeps the slider DOM alive across an entire drag.
    if (h.type === 'circle') {
      inspectorBody.appendChild(_physSlider('Radius', h.r, 4, 120, SNAP_POS, (v) => v.toFixed(0) + ' px', (v) => { h.r = v; }));
    } else if (h.type === 'lens') {
      inspectorBody.appendChild(_physSlider('Length', h.len, 10, 260, SNAP_POS, (v) => v.toFixed(0) + ' px', (v) => { h.len = v; }));
      inspectorBody.appendChild(_physSlider('Bulge',  h.bulge, 2, 80,  SNAP_POS, (v) => v.toFixed(0) + ' px', (v) => { h.bulge = v; }));
      inspectorBody.appendChild(_physSlider('Angle',  h.angle * 180 / Math.PI, 0, 360, 360 / 255,
        (v) => v.toFixed(0) + '°', (v) => { h.angle = v * Math.PI / 180; }));
    } else if (h.type === 'polygon') {
      const hint = document.createElement('div');
      hint.style.cssText = 'font-size: 12px; color: var(--text-dim); margin: 8px 0;';
      hint.textContent = 'Drag vertices. Double-click to delete a vertex, double-click an edge midpoint to insert one.';
      inspectorBody.appendChild(hint);
    }

    const hint = document.createElement('div');
    hint.style.cssText = 'font-size: 12px; color: var(--text-dim); margin-top: 8px;';
    hint.textContent = 'Right-click any hole handle to delete the hole.';
    inspectorBody.appendChild(hint);
  }

  function _row() {
    const d = document.createElement('div');
    d.className = 'row';
    d.style.cssText = 'display: flex; gap: 6px; flex-wrap: wrap;';
    return d;
  }
  function _label(text) {
    const s = document.createElement('span');
    s.textContent = text;
    s.style.cssText = 'font-size: 12px; color: var(--text-dim); display: inline-block; min-width: 54px;';
    return s;
  }
  function _btn(text, cls, onClick) {
    const b = document.createElement('button');
    b.className = cls || '';
    b.textContent = text;
    b.addEventListener('click', onClick);
    return b;
  }
  // Physical-value slider: range expressed in real units (px, rad, unit [0,1]),
  // step matches the URL codec's quantization so every visible tick-click
  // actually produces a new share URL. History snapshot is captured on
  // pointerdown so one drag = one undoable action.
  function _physSlider(label, value, min, max, step, formatter, onChange) {
    const row = document.createElement('div');
    row.className = 'row range-row';
    const header = document.createElement('div');
    header.className = 'range-header';
    const lab = document.createElement('span');
    lab.className = 'range-label'; lab.textContent = label;
    const val = document.createElement('span');
    val.className = 'range-value';
    const input = document.createElement('input');
    input.type = 'range';
    input.min = String(min); input.max = String(max); input.step = String(step);
    const clamped = Math.max(min, Math.min(max, value));
    input.value = String(clamped);
    val.textContent = formatter(Number(input.value));
    input.addEventListener('pointerdown', () => { pushHistory(); });
    input.addEventListener('input', () => {
      const v = Number(input.value);
      val.textContent = formatter(v);
      onChange(v);
      // Skip full render on purpose — rebuilding the inspector would wipe
      // this very <input> mid-drag and the thumb would stop tracking.
      renderExceptInspector();
    });
    header.append(lab, val);
    row.append(header, input);
    return row;
  }

  // ─── Hole-type conversion ───────────────────────────────────────
  function holeCenter(h) {
    if (h.type === 'circle' || h.type === 'lens') return { x: h.cx, y: h.cy };
    let sx = 0, sy = 0; for (const p of h.pts) { sx += p.x; sy += p.y; }
    return { x: sx / h.pts.length, y: sy / h.pts.length };
  }
  function holeApproxRadius(h) {
    if (h.type === 'circle') return h.r;
    if (h.type === 'lens') return h.len / 2;
    const c = holeCenter(h);
    let m = 0; for (const p of h.pts) { const d = Math.hypot(p.x - c.x, p.y - c.y); if (d > m) m = d; }
    return m;
  }
  function convertHoleType(idx, type) {
    const h = state.holes[idx];
    if (!h || h.type === type) return;
    pushHistory();
    const c = holeCenter(h);
    const r = holeApproxRadius(h);
    let n;
    if (type === 'circle') n = { type: 'circle', cx: c.x, cy: c.y, r };
    else if (type === 'lens') n = { type: 'lens', cx: c.x, cy: c.y, len: r * 2, angle: 0, bulge: r * 0.5 };
    else {
      const pts = [];
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * (Math.PI * 2) - Math.PI / 4;
        pts.push({ x: c.x + Math.cos(a) * r, y: c.y + Math.sin(a) * r });
      }
      n = { type: 'polygon', pts };
    }
    state.holes[idx] = n;
    render();
  }

  // ─── Structural edits ───────────────────────────────────────────
  function deleteAnchor(idx) {
    if (state.outerClosed && state.anchors.length <= 3) {
      setError('Outer needs at least 3 anchors.');
      return;
    }
    pushHistory();
    state.anchors.splice(idx, 1);
    state.edges.splice(idx, 1);
    if (state.anchors.length < 3) state.outerClosed = false;
    state.selected = null;
    render();
  }
  function deleteHole(idx) {
    pushHistory();
    state.holes.splice(idx, 1);
    state.selected = null;
    render();
  }
  function deletePolyHoleVertex(holeIdx, vIdx) {
    const h = state.holes[holeIdx];
    if (!h || h.type !== 'polygon') return;
    if (h.pts.length <= 3) { deleteHole(holeIdx); return; }
    pushHistory();
    h.pts.splice(vIdx, 1);
    render();
  }
  function splitEdge(idx) {
    // De Casteljau split at t=0.5 → preserves the rendered curve and gives
    // well-behaved tangents on the new anchor + neighbours. If the edge had
    // no tangents (straight line, default), the split still produces zero-
    // tangent neighbours + a zero-tangent midpoint — exactly what you'd want.
    pushHistory();
    const n = state.anchors.length;
    const a = state.anchors[idx];
    const b = state.anchors[(idx + 1) % n];
    const p0 = { x: a.x, y: a.y };
    const p1 = { x: a.x + (a.h2x || 0), y: a.y + (a.h2y || 0) };
    const p2 = { x: b.x + (b.h1x || 0), y: b.y + (b.h1y || 0) };
    const p3 = { x: b.x, y: b.y };
    const { left, right } = splitCubicBezier(p0, p1, p2, p3, 0.5);
    a.h2x = snapTan(left.p1.x - a.x); a.h2y = snapTan(left.p1.y - a.y);
    b.h1x = snapTan(right.p2.x - b.x); b.h1y = snapTan(right.p2.y - b.y);
    const mid = left.p3;
    const newAnchor = {
      x: snapPos(mid.x), y: snapPos(mid.y),
      h1x: snapTan(left.p2.x - mid.x),  h1y: snapTan(left.p2.y - mid.y),
      h2x: snapTan(right.p1.x - mid.x), h2y: snapTan(right.p1.y - mid.y),
    };
    const oldEdge = state.edges[idx];
    state.anchors.splice(idx + 1, 0, newAnchor);
    state.edges.splice(idx + 1, 0, { kind: oldEdge.kind, param: oldEdge.param });
    state.selected = { kind: 'anchor', idx: idx + 1 };
    render();
  }
  function splitPolyHoleEdge(holeIdx, edgeIdx) {
    const h = state.holes[holeIdx];
    if (!h || h.type !== 'polygon') return;
    pushHistory();
    const n = h.pts.length;
    const p0 = h.pts[edgeIdx], p1 = h.pts[(edgeIdx + 1) % n];
    h.pts.splice(edgeIdx + 1, 0, { x: snapPos((p0.x + p1.x) / 2), y: snapPos((p0.y + p1.y) / 2) });
    render();
  }
  function straightenAdjacent(edgeIdx) {
    const n = state.anchors.length;
    const a = state.anchors[edgeIdx];
    const b = state.anchors[(edgeIdx + 1) % n];
    a.h2x = a.h2y = 0;
    b.h1x = b.h1y = 0;
    render();
  }

  // ─── Pointer flow ───────────────────────────────────────────────
  svg.addEventListener('pointerdown', (e) => {
    // Right-button is for delete (handled via `contextmenu` below).
    if (e.button === 2) return;

    const p = clampBoard(svgPoint(e));
    const t = e.target, role = t && t.dataset ? t.dataset.role : null;

    // Handle clicks: set selection + arm drag, but do NOT rebuild handle DOM.
    // History is pushed on the first real pointermove (see below) so a
    // click-without-drag doesn't pollute undo, and the handle's DOM identity
    // is preserved between the two clicks that a dblclick needs. The SVG
    // fills the viewport, so we skip pointer capture — pointermove bubbles
    // up to our listener wherever the cursor goes inside the window.
    if (role === 'anchor') {
      const idx = Number(t.dataset.idx);
      if (!state.outerClosed && idx === 0 && state.anchors.length >= 3) {
        closeOuter();
        return;
      }
      const a = state.anchors[idx];
      state.selected = { kind: 'anchor', idx };
      // originData holds the pre-drag value; applyDrag computes new position
      // as originData + (p − origin). This eliminates the "jump" where the
      // handle would teleport to the pointer once threshold was crossed.
      state.drag = {
        kind: 'anchor', idx,
        pointerId: e.pointerId, moved: false,
        origin: { x: p.x, y: p.y },
        originData: { x: a.x, y: a.y },
      };
      selectAndRefreshInspector();
      return;
    }
    if (role === 'tangent') {
      const idx = Number(t.dataset.idx);
      const which = t.dataset.which;
      const a = state.anchors[idx];
      state.drag = {
        kind: 'tangent', which, idx,
        pointerId: e.pointerId, moved: false,
        origin: { x: p.x, y: p.y },
        originData: { hx: a[which + 'x'] || 0, hy: a[which + 'y'] || 0 },
      };
      return;
    }
    if (role === 'edge-mid') {
      const idx = Number(t.dataset.idx);
      state.selected = { kind: 'edge', idx };
      state.drag = {
        kind: 'edge-mid', idx,
        pointerId: e.pointerId, moved: false,
        origin: { x: p.x, y: p.y },
        originData: { param: state.edges[idx].param },
      };
      selectAndRefreshInspector();
      return;
    }
    if (role === 'centroid' || role === 'centroid-rotate' || role === 'centroid-scale') {
      const s = currentShape();
      if (!s) return;
      const c = shapeCentroid(s);
      const od = {
        centroid: c,
        anchors: state.anchors.map(a => ({
          x: a.x, y: a.y,
          h1x: a.h1x || 0, h1y: a.h1y || 0,
          h2x: a.h2x || 0, h2y: a.h2y || 0,
        })),
        holes: state.holes.map(h => {
          if (h.type === 'polygon') return { type: 'polygon', pts: h.pts.map(pt => ({ x: pt.x, y: pt.y })) };
          return Object.assign({}, h);
        }),
      };
      if (role === 'centroid-rotate') od.originAngle = Math.atan2(p.y - c.y, p.x - c.x);
      if (role === 'centroid-scale') od.originDist = Math.max(1, Math.hypot(p.x - c.x, p.y - c.y));
      state.selected = { kind: 'centroid' };
      const dragKind =
        role === 'centroid-rotate' ? 'centroid-rotate' :
        role === 'centroid-scale'  ? 'centroid-scale' :
        'centroid-move';
      state.drag = {
        kind: dragKind,
        pointerId: e.pointerId, moved: false,
        origin: { x: p.x, y: p.y },
        originData: od,
      };
      selectAndRefreshInspector();
      return;
    }
    if (role === 'hole-center' || role === 'hole-rim' || role === 'hole-lens-end' || role === 'hole-lens-bulge') {
      const hi = Number(t.dataset.hole);
      const h = state.holes[hi];
      state.selected = { kind: 'hole', idx: hi };
      const od = {};
      if (role === 'hole-center') { od.cx = h.cx; od.cy = h.cy; }
      else if (role === 'hole-rim') { od.r = h.r; }
      else if (role === 'hole-lens-end') {
        const dx0 = Math.cos(h.angle), dy0 = Math.sin(h.angle);
        od.ax = h.cx - dx0 * h.len / 2; od.ay = h.cy - dy0 * h.len / 2;
        od.bx = h.cx + dx0 * h.len / 2; od.by = h.cy + dy0 * h.len / 2;
      }
      else if (role === 'hole-lens-bulge') { od.bulge = h.bulge; }
      state.drag = {
        kind: role, hole: hi, idx: Number(t.dataset.idx || -1),
        pointerId: e.pointerId, moved: false,
        origin: { x: p.x, y: p.y },
        originData: od,
      };
      selectAndRefreshInspector();
      return;
    }
    if (role === 'hole-vertex') {
      const hi = Number(t.dataset.hole);
      const vi = Number(t.dataset.idx);
      const pt = state.holes[hi].pts[vi];
      state.selected = { kind: 'hole', idx: hi };
      state.drag = {
        kind: 'hole-vertex', hole: hi, idx: vi,
        pointerId: e.pointerId, moved: false,
        origin: { x: p.x, y: p.y },
        originData: { x: pt.x, y: pt.y },
      };
      selectAndRefreshInspector();
      return;
    }
    if (role === 'hole-edge-mid') {
      state.selected = { kind: 'hole', idx: Number(t.dataset.hole) };
      selectAndRefreshInspector();
      return;
    }

    // Empty canvas.
    if (state.mode === 'outer' && !state.outerClosed) {
      createAnchor(p);
      return;
    }
    if (state.mode === 'hole' && state.outerClosed) {
      createCircleHole(p);
      return;
    }
    if (state.mode === 'outer' && state.outerClosed) {
      setHint('Outer is closed. Use edge midpoint → Split, or switch to Hole mode.');
    }
    state.selected = null;
    // Deselection doesn't change geometry → keep handle DOM stable so any
    // subsequent dblclick retains both clicks' targets as the same node.
    selectAndRefreshInspector();
  });

  // Right-click: delete anchor / tangent / hole. Suppresses the native
  // context menu everywhere over the canvas (including empty space) so it
  // never pops up mid-edit.
  svg.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const t = e.target, role = t && t.dataset ? t.dataset.role : null;
    if (role === 'anchor') {
      const idx = Number(t.dataset.idx);
      deleteAnchor(idx);
    } else if (role === 'tangent') {
      deleteTangent(Number(t.dataset.idx), t.dataset.which);
    } else if (role === 'hole-center' || role === 'hole-rim' || role === 'hole-lens-end' || role === 'hole-lens-bulge') {
      deleteHole(Number(t.dataset.hole));
    } else if (role === 'hole-vertex') {
      deletePolyHoleVertex(Number(t.dataset.hole), Number(t.dataset.idx));
    }
  });

  svg.addEventListener('pointermove', (e) => {
    const p = clampBoard(svgPoint(e));
    state.hoverPoint = p;
    if (state.drag) {
      // First pointermove of a drag session → snapshot so Undo rewinds to
      // the pre-drag state. Delta-based drag (see applyDrag) means any pixel
      // of movement moves the handle by the same distance, so there's no
      // threshold — fine adjustments feel the same as large ones.
      if (!state.drag.moved) {
        state.drag.moved = true;
        pushHistory();
      }
      applyDrag(p);
      render();
    } else if (!state.outerClosed && state.anchors.length && state.mode === 'outer') {
      renderGhost();
    }
  });

  svg.addEventListener('pointerup', (e) => {
    if (state.drag && state.drag.pointerId === e.pointerId) {
      const wasMoved = state.drag.moved;
      state.drag = null;
      // Only re-render when the drag actually mutated state. A click-without-
      // drag already has the correct visuals from selectAndRefreshInspector()
      // in pointerdown, and rebuilding handle DOM here would break the second
      // half of a dblclick.
      if (wasMoved) render();
    }
  });
  svg.addEventListener('pointercancel', () => {
    const wasMoved = state.drag && state.drag.moved;
    state.drag = null;
    if (wasMoved) render();
  });
  svg.addEventListener('pointerleave', () => {
    if (!state.drag) { state.hoverPoint = null; renderGhost(); }
  });

  svg.addEventListener('dblclick', (e) => {
    const t = e.target, role = t && t.dataset ? t.dataset.role : null;
    if (role === 'anchor') {
      // Double-click on an outer anchor adds whichever tangents are currently
      // missing. Fresh anchors start with none, so one dbl-click = smooth
      // curve; re-adding a previously deleted tangent preserves the other
      // one unchanged.
      addMissingTangents(Number(t.dataset.idx));
      e.preventDefault();
    } else if (role === 'edge-mid') {
      splitEdge(Number(t.dataset.idx));
      e.preventDefault();
    } else if (role === 'hole-vertex') {
      deletePolyHoleVertex(Number(t.dataset.hole), Number(t.dataset.idx));
      e.preventDefault();
    } else if (role === 'hole-edge-mid') {
      splitPolyHoleEdge(Number(t.dataset.hole), Number(t.dataset.idx));
      e.preventDefault();
    }
  });

  function applyDrag(p) {
    const d = state.drag;
    if (!d) return;
    // Delta-based: everything moves by (p - origin) from its pre-drag value.
    // This prevents the handle from "teleporting" to the pointer position
    // when the drag threshold is crossed — the handle travels exactly as far
    // as the pointer does, regardless of where the user clicked on it.
    const dx = p.x - d.origin.x;
    const dy = p.y - d.origin.y;
    const od = d.originData || {};

    if (d.kind === 'anchor') {
      const a = state.anchors[d.idx];
      a.x = snapPos(od.x + dx);
      a.y = snapPos(od.y + dy);
    } else if (d.kind === 'tangent') {
      const a = state.anchors[d.idx];
      if (!a) return;
      a[d.which + 'x'] = snapTan(od.hx + dx);
      a[d.which + 'y'] = snapTan(od.hy + dy);
    } else if (d.kind === 'hole-center') {
      const h = state.holes[d.hole];
      h.cx = snapPos(od.cx + dx);
      h.cy = snapPos(od.cy + dy);
    } else if (d.kind === 'hole-rim') {
      const h = state.holes[d.hole];
      // Rim handle was originally at (cx + r, cy). Moving by (dx, dy) puts it
      // at (cx + r + dx, cy + dy); new radius = distance from centre.
      h.r = snapPos(Math.max(4, Math.hypot(od.r + dx, dy)));
    } else if (d.kind === 'hole-lens-end') {
      const h = state.holes[d.hole];
      let ax, ay, bx, by;
      if (d.idx === 0) { ax = od.ax + dx; ay = od.ay + dy; bx = od.bx; by = od.by; }
      else             { ax = od.ax; ay = od.ay; bx = od.bx + dx; by = od.by + dy; }
      const ndx = bx - ax, ndy = by - ay;
      h.cx = snapPos((ax + bx) / 2); h.cy = snapPos((ay + by) / 2);
      h.len = snapPos(Math.max(6, Math.hypot(ndx, ndy)));
      h.angle = Math.atan2(ndy, ndx);
    } else if (d.kind === 'hole-lens-bulge') {
      const h = state.holes[d.hole];
      // Perpendicular delta relative to current lens axis; new bulge = origin
      // bulge + projected delta. Sign flip becomes |·|.
      const px = -Math.sin(h.angle), py = Math.cos(h.angle);
      const projDelta = dx * px + dy * py;
      h.bulge = snapPos(Math.max(2, Math.abs(od.bulge + projDelta)));
    } else if (d.kind === 'hole-vertex') {
      state.holes[d.hole].pts[d.idx] = { x: snapPos(od.x + dx), y: snapPos(od.y + dy) };
    } else if (d.kind === 'edge-mid') {
      // Dragging an edge midpoint adjusts that edge's strength param. Direction
      // follows the outward perpendicular (away from board centre) so dragging
      // away grows the modifier, and dragging back shrinks it. SMOOTH edges
      // ignore param, so the drag is inert for them.
      const edge = state.edges[d.idx];
      if (edge.kind === EDGE_KIND.SMOOTH) return;
      const n = state.anchors.length;
      const a = state.anchors[d.idx];
      const b = state.anchors[(d.idx + 1) % n];
      const edx = b.x - a.x, edy = b.y - a.y;
      const elen = Math.hypot(edx, edy) || 1;
      let perpX = -edy / elen, perpY = edx / elen;
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      if (perpX * (CX - mx) + perpY * (CY - my) > 0) { perpX = -perpX; perpY = -perpY; }
      const offset = dx * perpX + dy * perpY;
      const paramDelta = offset / 80;
      edge.param = Math.max(0, Math.min(1, od.param + paramDelta));
    } else if (d.kind === 'centroid-move') {
      _applyTransformFromOrigin(od, (x, y) => ({ x: x + dx, y: y + dy }), 1, 0);
    } else if (d.kind === 'centroid-rotate') {
      const c = od.centroid;
      const curAngle = Math.atan2(p.y - c.y, p.x - c.x);
      const theta = curAngle - od.originAngle;
      const ca = Math.cos(theta), sa = Math.sin(theta);
      _applyTransformFromOrigin(od, (x, y) => ({
        x: c.x + (x - c.x) * ca - (y - c.y) * sa,
        y: c.y + (x - c.x) * sa + (y - c.y) * ca,
      }), 1, theta);
    } else if (d.kind === 'centroid-scale') {
      const c = od.centroid;
      const curDist = Math.hypot(p.x - c.x, p.y - c.y);
      const f = Math.max(0.1, curDist / od.originDist);
      _applyTransformFromOrigin(od, (x, y) => ({
        x: c.x + (x - c.x) * f,
        y: c.y + (y - c.y) * f,
      }), f, 0);
    }
  }

  // Re-applies a scalar/rotational transform to anchors + holes from the
  // pre-drag snapshot in `od` (captured at pointerdown). Computes positions
  // fresh from the snapshot every pointermove, so repeated rotations/scales
  // don't drift from numerical error. `vScale` scales tangent offsets (and
  // radii / lens len + bulge); `dTheta` rotates tangent offsets and lens
  // axes. For pure translate: vScale = 1, dTheta = 0.
  function _applyTransformFromOrigin(od, mapPoint, vScale, dTheta) {
    const cosT = Math.cos(dTheta), sinT = Math.sin(dTheta);
    const rotVec = (x, y) => ({ x: x * cosT - y * sinT, y: x * sinT + y * cosT });
    for (let i = 0; i < state.anchors.length; i++) {
      const src = od.anchors[i];
      if (!src) continue;
      const np = mapPoint(src.x, src.y);
      const dst = state.anchors[i];
      dst.x = snapPos(np.x);
      dst.y = snapPos(np.y);
      const t1 = rotVec(src.h1x, src.h1y);
      const t2 = rotVec(src.h2x, src.h2y);
      dst.h1x = snapTan(t1.x * vScale);
      dst.h1y = snapTan(t1.y * vScale);
      dst.h2x = snapTan(t2.x * vScale);
      dst.h2y = snapTan(t2.y * vScale);
    }
    for (let i = 0; i < state.holes.length; i++) {
      const src = od.holes[i];
      const dst = state.holes[i];
      if (!src || !dst || src.type !== dst.type) continue;
      if (dst.type === 'polygon') {
        for (let j = 0; j < dst.pts.length; j++) {
          const sp = src.pts[j];
          if (!sp) continue;
          const np = mapPoint(sp.x, sp.y);
          dst.pts[j].x = snapPos(np.x);
          dst.pts[j].y = snapPos(np.y);
        }
      } else if (dst.type === 'circle') {
        const np = mapPoint(src.cx, src.cy);
        dst.cx = snapPos(np.x); dst.cy = snapPos(np.y);
        dst.r = snapPos(Math.max(3, src.r * vScale));
      } else if (dst.type === 'lens') {
        const np = mapPoint(src.cx, src.cy);
        dst.cx = snapPos(np.x); dst.cy = snapPos(np.y);
        dst.len = snapPos(Math.max(4, src.len * vScale));
        dst.bulge = snapPos(Math.max(1, src.bulge * vScale));
        dst.angle = src.angle + dTheta;
      }
    }
  }

  function createAnchor(p) {
    if (state.anchors.length) {
      const last = state.anchors[state.anchors.length - 1];
      if (dist(p, last) < MIN_SEG_PX) return;
    }
    if (state.anchors.length >= 100) { setError('Max 100 anchors.'); return; }
    pushHistory();
    const sp = snapPt(p);
    // Anchors are always created as corners (zero tangents). Users opt into
    // curves by double-clicking an anchor or via the "Add tangent(s)" button
    // in the inspector, then drag the tangent handles to shape the curve.
    state.anchors.push({ x: sp.x, y: sp.y, h1x: 0, h1y: 0, h2x: 0, h2y: 0 });
    state.edges.push({ kind: EDGE_KIND.SMOOTH, param: 0 });
    setError('');
    render();
  }

  function createCircleHole(p) {
    if (state.holes.length >= 6) { setError('Max 6 holes.'); return; }
    pushHistory();
    const sp = snapPt(p);
    const hole = { type: 'circle', cx: sp.x, cy: sp.y, r: DEFAULT_CIRCLE_R };
    state.holes.push(hole);
    state.selected = { kind: 'hole', idx: state.holes.length - 1 };
    setError('');
    render();
  }

  function closeOuter() {
    if (state.anchors.length < 3) return;
    pushHistory();
    state.outerClosed = true;
    const s = currentShape();
    const v = shapeIsValid(s);
    if (!v.ok) setError(v.reason);
    else setError('');
    render();
  }

  // ─── Master render ──────────────────────────────────────────────
  // Full rebuild of everything. Expensive but simple; avoid on hot paths
  // where DOM identity matters (see the two variants below).
  function render() {
    renderKFoldAxes();
    renderShape();
    renderDraft();
    renderGhost();
    renderHandles();
    renderInspector();
    updateStats();
    updateURL();
    updateHintByContext();
  }

  // Rebuild everything except the inspector. Used by inspector sliders: the
  // 'input' event fires during a drag, and a full render() would wipe the
  // slider DOM mid-drag and kill the drag session — that's why the strength
  // slider only accepted single clicks. This variant keeps the slider alive.
  function renderExceptInspector() {
    renderKFoldAxes();
    renderShape();
    renderDraft();
    renderGhost();
    renderHandles();
    updateStats();
    updateURL();
    updateHintByContext();
  }

  // Update ONLY the 'selected' class on existing handle DOM, plus swap the
  // inspector contents. Does not rebuild handleLayer. Used on click-to-select
  // so that the handle keeps its DOM identity across a click pair — browser
  // dblclick detection fails if the two clicks' targets are different nodes,
  // and renderHandles() destroys/recreates all handles on every call. Also
  // flips tangent-handle visibility so only the selected anchor shows its
  // tangents — same DOM, just `.visible` toggle.
  function selectAndRefreshInspector() {
    const all = handleLayer.querySelectorAll('[data-role]');
    all.forEach(el => el.classList.remove('selected'));
    const sel = state.selected;
    if (sel) {
      all.forEach(el => {
        const r = el.dataset.role;
        if (sel.kind === 'anchor' && r === 'anchor' && Number(el.dataset.idx) === sel.idx) el.classList.add('selected');
        else if (sel.kind === 'edge' && r === 'edge-mid' && Number(el.dataset.idx) === sel.idx) el.classList.add('selected');
        else if (sel.kind === 'hole' && r && r.indexOf('hole-') === 0 && Number(el.dataset.hole) === sel.idx) el.classList.add('selected');
      });
    }
    const selAnchorIdx = (sel && sel.kind === 'anchor') ? sel.idx : -1;
    handleLayer.querySelectorAll('[data-anchor]').forEach(el => {
      el.classList.toggle('visible', Number(el.dataset.anchor) === selAnchorIdx);
    });
    // Centroid sits in its own layer and shows/hides the rotate+scale gizmos
    // based on selection, so refresh it here instead of a full render.
    renderCentroidAndTransform();
    renderInspector();
    updateHintByContext();
  }

  // ─── Top-bar controls ───────────────────────────────────────────
  function setMode(m) {
    // Clicking an already-active mode toggles it off — drops into pure edit
    // (no create action on empty clicks). Any handle remains draggable.
    if (state.mode === m) m = null;
    if (m === 'hole' && !state.outerClosed) {
      setError('Close the outer ring first.');
      return;
    }
    state.mode = m;
    document.getElementById('mode-outer').classList.toggle('active', m === 'outer');
    document.getElementById('mode-hole').classList.toggle('active', m === 'hole');
    render();
  }
  document.getElementById('mode-outer').addEventListener('click', () => setMode('outer'));
  document.getElementById('mode-hole').addEventListener('click', () => setMode('hole'));

  document.getElementById('btn-close').addEventListener('click', closeOuter);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (state.anchors.length || state.holes.length) pushHistory();
    state.anchors = []; state.edges = []; state.outerClosed = false;
    state.holes = []; state.selected = null; state.drag = null;
    setMode('outer'); setError(''); render();
  });
  document.getElementById('btn-normalize').addEventListener('click', () => {
    const s = currentShape();
    if (!s) { setError('Close the outer first.'); return; }
    const net = shapeArea(s);
    if (net < 1) { setError('Shape area is zero.'); return; }
    pushHistory();
    let scale = Math.sqrt(TARGET_AREA / net);
    let maxD = 0;
    for (const pt of s.outer) {
      const d = Math.hypot(pt.x - CX, pt.y - CY);
      if (d > maxD) maxD = d;
    }
    if (maxD * scale > MAX_R) scale = MAX_R / maxD;
    const scalePt = (p) => ({ x: snapPos(CX + (p.x - CX) * scale), y: snapPos(CY + (p.y - CY) * scale) });
    state.anchors = state.anchors.map((a) => ({
      x: snapPos(CX + (a.x - CX) * scale), y: snapPos(CY + (a.y - CY) * scale),
      h1x: snapTan(a.h1x * scale), h1y: snapTan(a.h1y * scale),
      h2x: snapTan(a.h2x * scale), h2y: snapTan(a.h2y * scale),
    }));
    state.holes = state.holes.map((h) => {
      if (h.type === 'polygon') return { type: 'polygon', pts: h.pts.map(scalePt) };
      if (h.type === 'circle') {
        const c = scalePt({ x: h.cx, y: h.cy });
        return { type: 'circle', cx: c.x, cy: c.y, r: snapPos(h.r * scale) };
      }
      if (h.type === 'lens') {
        const c = scalePt({ x: h.cx, y: h.cy });
        return { type: 'lens', cx: c.x, cy: c.y, len: snapPos(h.len * scale), angle: h.angle, bulge: snapPos(h.bulge * scale) };
      }
      return h;
    });
    setError('');
    render();
  });

  const kfoldInput = document.getElementById('kfold');
  const kfoldVal = document.getElementById('kfold-val');
  // pointerdown → pre-change snapshot (one undo entry per slider interaction),
  // input → live state update.
  kfoldInput.addEventListener('pointerdown', () => { pushHistory(); });
  kfoldInput.addEventListener('input', () => {
    state.kFold = Number(kfoldInput.value) | 0;
    kfoldVal.textContent = String(state.kFold);
    render();
  });

  // ─── Bottom bar: URL + share ────────────────────────────────────
  document.getElementById('target-variation').addEventListener('change', updateURL);
  document.getElementById('btn-open').addEventListener('click', () => {
    const url = urlOut.value;
    if (!url) { setError('Shape is not valid yet.'); return; }
    window.open(url, '_blank', 'noopener');
  });
  document.getElementById('btn-copy').addEventListener('click', async () => {
    if (!urlOut.value) return;
    try {
      await navigator.clipboard.writeText(urlOut.value);
      const btn = document.getElementById('btn-copy');
      const orig = btn.textContent;
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = orig; }, 1000);
    } catch (_) { /* ignore */ }
  });
  document.getElementById('btn-import').addEventListener('click', () => {
    const raw = prompt('Paste a c-… URL or token:');
    if (!raw) return;
    const s = raw.trim();
    let token = null;
    if (s.indexOf('c-') === 0) token = s;
    else {
      try { const u = new URL(s, 'https://geometric.games/'); token = u.searchParams.get('s'); } catch (_) {}
    }
    if (!token || token.indexOf('c-') !== 0) { setError('Not a c-… URL.'); return; }
    const design = decodeCustomShapeDesign(token);
    if (!design) { setError('Could not decode that token.'); return; }
    state.anchors = design.anchors;
    state.edges = design.edges;
    state.holes = design.holes;
    state.kFold = design.kFold;
    state.outerClosed = true;
    state.selected = null;
    state.drag = null;
    kfoldInput.value = String(state.kFold);
    kfoldVal.textContent = String(state.kFold);
    setMode('outer');
    setError('');
    render();
  });

  // ─── Keyboard ───────────────────────────────────────────────────
  window.addEventListener('keydown', (e) => {
    const tag = e.target ? e.target.tagName : null;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) {
      e.preventDefault(); document.getElementById('btn-undo').click();
    } else if (e.key === 'u' || e.key === 'U') {
      document.getElementById('btn-undo').click();
    } else if (e.key === 'Enter') {
      if (!state.outerClosed) closeOuter();
    } else if (e.key === 'Escape') {
      state.selected = null; render();
    } else if (e.key === 'Delete' || e.key === 'Backspace') {
      const sel = state.selected;
      if (!sel) return;
      e.preventDefault();
      if (sel.kind === 'anchor') deleteAnchor(sel.idx);
      else if (sel.kind === 'hole') deleteHole(sel.idx);
    } else if (e.key === '1') setMode('outer');
    else if (e.key === '2') setMode('hole');
  });

  // ─── Bootstrap ──────────────────────────────────────────────────
  (function bootstrap() {
    const sp = new URLSearchParams(window.location.search);
    const s = sp.get('s');
    if (s && s.indexOf('c-') === 0) {
      const design = decodeCustomShapeDesign(s);
      if (design) {
        state.anchors = design.anchors;
        state.edges = design.edges;
        state.holes = design.holes;
        state.kFold = design.kFold;
        state.outerClosed = true;
        kfoldInput.value = String(state.kFold);
        kfoldVal.textContent = String(state.kFold);
      }
    }
    render();
  })();
})();
</script>
</body>
</html>
